name: Deploy docs

# hope's docs site — a loom SPA in site/ that renders as hope's own chrome. Built
# static and published to GitHub Pages on any push that touches it.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: site
      - run: npm run build
        working-directory: site
        env:
          # Project-pages path (https://<owner>.github.io/hope/). Set to "/" for a
          # custom domain.
          DOCS_BASE: /hope/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

name: Build and publish image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ghcr requires a lowercase image path; the owner "Toyz" must be folded.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/hope" >> "$GITHUB_ENV"

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # If github.com/Toyz/sov is PRIVATE, uncomment and add a PAT secret
          # (repo:read on Toyz/sov) so `go mod download` can fetch it:
          # build-args: |
          #   GOPRIVATE=github.com/Toyz/*
          # secret-files: |
          #   netrc=${{ runner.temp }}/.netrc

name: Build and publish image

on:
  push:
    branches: [main]
    # hope release tags only. The Go SDK is a nested module tagged `plugin/vX.Y.Z`;
    # those are SDK versions, not hope images — exclude them so they never build hope.
    # (`v*` already can't match `plugin/…`; the ignore makes the intent explicit.)
    tags: ["v*", "!plugin/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # ghcr requires a lowercase image path; the owner "Toyz" must be folded.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/hope" >> "$GITHUB_ENV"

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v4

      - name: Build metadata
        id: bi
        run: |
          echo "buildtime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Stamp the short commit sha as the build id — into both the Go binary
          # (internal/version) and the SPA (HOPE_VERSION -> __HOPE_VERSION__), so
          # the topbar + agent cards show the exact build instead of "dev".
          build-args: |
            VERSION=${{ steps.bi.outputs.sha_short }}
            HOPE_VERSION=${{ steps.bi.outputs.sha_short }}
            REVISION=${{ github.sha }}
            BUILDTIME=${{ steps.bi.outputs.buildtime }}
          # If github.com/Toyz/sov is PRIVATE, also add (and a PAT secret with
          # repo:read on Toyz/sov so `go mod download` can fetch it):
          #   GOPRIVATE=github.com/Toyz/*
          # secret-files: |
          #   netrc=${{ runner.temp }}/.netrc

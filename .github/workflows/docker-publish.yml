name: Build and publish images

on:
  push:
    branches: [main]
    # The standalone Pages workflow owns docs builds. A mixed commit still runs
    # this workflow because at least one changed path is outside these entries.
    paths-ignore:
      - "site/**"
      - ".github/workflows/docs.yml"
    # hope release tags only. The Go SDK is a nested module tagged `plugin/vX.Y.Z`;
    # those are SDK versions, not hope images — exclude them so they never build hope.
    # (`v*` already can't match `plugin/…`; the ignore makes the intent explicit.)
    tags: ["v*", "!plugin/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # Decide WHICH images to build. On a branch push we diff the commit and build
  # only the images whose sources actually changed — so a frontend-only change no
  # longer rebuilds + repushes the DB plugins (whose digest would otherwise churn
  # from the stamped build-args and trigger a phantom fleet "update"). A release
  # tag or a manual run forces every image so a release publishes the full set.
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      # Per-image path filters. Each plugin depends on the in-repo SDK (plugin/**)
      # and the module files, so an SDK change rebuilds every plugin; the server
      # (hope) depends on the Go source + the SPA. Filter keys avoid hyphens (the
      # `${{ }}` parser reads `-` as minus), so they're mapped to image names below.
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hope:
              - 'cmd/**'
              - 'internal/**'
              - 'frontend/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            kitchensink:
              - 'plugin/**'
              - 'go.mod'
              - 'go.sum'
              - 'examples/plugins/kitchen-sink/**'
            postgres:
              - 'plugin/**'
              - 'go.mod'
              - 'go.sum'
              - 'examples/plugins/hope-postgres/**'
            redis:
              - 'plugin/**'
              - 'go.mod'
              - 'go.sum'
              - 'examples/plugins/hope-redis/**'
            nats:
              - 'plugin/**'
              - 'go.mod'
              - 'go.sum'
              - 'examples/plugins/hope-nats/**'

      - name: Build the image matrix from what changed
        id: set
        env:
          F_HOPE: ${{ steps.filter.outputs.hope }}
          F_KITCHENSINK: ${{ steps.filter.outputs.kitchensink }}
          F_POSTGRES: ${{ steps.filter.outputs.postgres }}
          F_REDIS: ${{ steps.filter.outputs.redis }}
          F_NATS: ${{ steps.filter.outputs.nats }}
        run: |
          set -euo pipefail
          # A release tag or a manual dispatch publishes the full set.
          force=false
          case "${{ github.ref }}" in refs/tags/*) force=true;; esac
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && force=true

          # filter-key -> "image-name dockerfile"
          declare -A img=(
            [hope]="hope Dockerfile"
            [kitchensink]="kitchen-sink examples/plugins/kitchen-sink/Dockerfile"
            [postgres]="hope-postgres examples/plugins/hope-postgres/Dockerfile"
            [redis]="hope-redis examples/plugins/hope-redis/Dockerfile"
            [nats]="hope-nats examples/plugins/hope-nats/Dockerfile"
          )
          inc=()
          for key in hope kitchensink postgres redis nats; do
            var="F_${key^^}"
            if [ "$force" = true ] || [ "${!var}" = "true" ]; then
              set -- ${img[$key]}
              inc+=("$(jq -nc --arg n "$1" --arg d "$2" '{name:$n, dockerfile:$d}')")
            fi
          done

          if [ ${#inc[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "any=false" >> "$GITHUB_OUTPUT"
            echo "No image sources changed — nothing to build."
          else
            matrix=$(printf '%s\n' "${inc[@]}" | jq -sc '{include: .}')
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
            echo "Building: $(printf '%s\n' "${inc[@]}" | jq -r '.name' | paste -sd, -)"
          fi

  build:
    needs: changes
    if: needs.changes.outputs.any == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      # One image per matrix entry — only the images `changes` selected. Each is its
      # own ghcr repo (ghcr.io/<owner>/<name>) on the same triggers.
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          # ghcr login uses the token via docker/login-action, not git config, so
          # don't leave GITHUB_TOKEN in .git/config for a later step to read back.
          persist-credentials: false

      # ghcr requires a lowercase image path; the owner "Toyz" must be folded.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v4

      - name: Build metadata
        id: bi
        run: |
          echo "buildtime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # metadata-action adds OCI (org.opencontainers.*) labels; a plugin's
          # hope.plugin.* discovery labels are on different keys and are preserved.
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so the images don't clobber each other's buildx cache.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # Stamp the short commit sha as the build id — into both the Go binary
          # (internal/version) and the SPA (HOPE_VERSION -> __HOPE_VERSION__), so the
          # topbar + agent cards show the exact build instead of "dev". Reference
          # plugins don't declare these ARGs, so they're ignored there.
          build-args: |
            VERSION=${{ steps.bi.outputs.sha_short }}
            HOPE_VERSION=${{ steps.bi.outputs.sha_short }}
            REVISION=${{ github.sha }}
            BUILDTIME=${{ steps.bi.outputs.buildtime }}
          # If github.com/Toyz/sov is PRIVATE, also add (and a PAT secret with
          # repo:read on Toyz/sov so `go mod download` can fetch it):
          #   GOPRIVATE=github.com/Toyz/*
          # secret-files: |
          #   netrc=${{ runner.temp }}/.netrc

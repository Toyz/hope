name: Build and publish images

on:
  push:
    branches: [main]
    # hope release tags only. The Go SDK is a nested module tagged `plugin/vX.Y.Z`;
    # those are SDK versions, not hope images — exclude them so they never build hope.
    # (`v*` already can't match `plugin/…`; the ignore makes the intent explicit.)
    tags: ["v*", "!plugin/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      # One image per matrix row, each its own ghcr repo (ghcr.io/<owner>/<name>),
      # all on the same triggers. Add an image = append a row.
      matrix:
        include:
          # The hope server (root Dockerfile). Only this Dockerfile declares the
          # VERSION/HOPE_VERSION/REVISION/BUILDTIME ARGs stamped below.
          - name: hope
            dockerfile: Dockerfile
          # First-party reference plugins. Their Dockerfiles build from the repo root
          # (the go.mod `replace` points at the in-repo SDK), so the context stays `.`.
          # They don't declare the stamping ARGs, so those build-args are ignored for
          # them (stdlib+driver only — no sov, no private-repo secrets needed).
          - name: hope-postgres
            dockerfile: examples/plugins/hope-postgres/Dockerfile
          - name: hope-redis
            dockerfile: examples/plugins/hope-redis/Dockerfile
    steps:
      - uses: actions/checkout@v5

      # ghcr requires a lowercase image path; the owner "Toyz" must be folded.
      - name: Compute lowercase image name
        run: echo "IMAGE=${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/setup-buildx-action@v4

      - name: Build metadata
        id: bi
        run: |
          echo "buildtime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # metadata-action adds OCI (org.opencontainers.*) labels; a plugin's
          # hope.plugin.* discovery labels are on different keys and are preserved.
          labels: ${{ steps.meta.outputs.labels }}
          # Per-image cache scope so the images don't clobber each other's buildx cache.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          # Stamp the short commit sha as the build id — into both the Go binary
          # (internal/version) and the SPA (HOPE_VERSION -> __HOPE_VERSION__), so the
          # topbar + agent cards show the exact build instead of "dev". Reference
          # plugins don't declare these ARGs, so they're ignored there.
          build-args: |
            VERSION=${{ steps.bi.outputs.sha_short }}
            HOPE_VERSION=${{ steps.bi.outputs.sha_short }}
            REVISION=${{ github.sha }}
            BUILDTIME=${{ steps.bi.outputs.buildtime }}
          # If github.com/Toyz/sov is PRIVATE, also add (and a PAT secret with
          # repo:read on Toyz/sov so `go mod download` can fetch it):
          #   GOPRIVATE=github.com/Toyz/*
          # secret-files: |
          #   netrc=${{ runner.temp }}/.netrc

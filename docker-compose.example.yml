# hope deployment template. Copy to docker-compose.yml and adjust.
#
# hope runs as a container on the host it manages and reaches the Docker daemon
# through the mounted socket. SECURITY: mounting the docker socket grants
# root-equivalent control of the host to this container — only run hope on a
# trusted network and behind its login.
services:
  hope:
    image: ghcr.io/OWNER/hope:latest
    # or build locally:
    # build: .
    container_name: hope
    restart: unless-stopped
    ports:
      - "8080:8080" # the UI + API; reach it over your LAN / overlay (e.g. ZeroTier)
    volumes:
      # Docker API — required.
      - /var/run/docker.sock:/var/run/docker.sock
      # Config — required (holds your login + token secret).
      - ./config.toml:/app/config.toml:ro
      # Private-registry pull credentials (so `pull`/`redeploy` authenticate and
      # avoid anonymous rate limits). Mount the docker config.json where YOUR
      # `docker login` wrote it (Linux: /home/<you>/.docker/config.json) — hope
      # reads inline `auth` only, not credential helpers. Optional; the
      # [[registry]] blocks in config.toml are an alternative that needs no mount.
      - /home/youruser/.docker/config.json:/root/.docker/config.json:ro
      # Compose-file viewer (the in-UI "compose" button). Mount the dir that
      # holds your compose projects, read-only. Optional — all other ops are
      # API-based and need no files.
      # - /path/to/compose/projects:/path/to/compose/projects:ro
      # Persist the image-update cache across restarts. Optional — set
      # [updates] cache_path = "/data/updates.json" in config.toml to use it.
      # - hope-data:/data

  # hope-agent — run this on a REMOTE Docker host to manage it from a hope
  # elsewhere. It dials OUT to the hub and tunnels this host's socket back, so
  # the remote needs no inbound ports. Put this in the REMOTE host's compose,
  # not next to the hope service above. Requires [agent] token set on that hope.
  #
  # Secrets come from a .env file next to this compose (docker compose reads it
  # automatically): HOPE_AGENT_TOKEN, and — if the agent path is behind
  # Cloudflare Access — CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET.
  # hope-agent:
  #   image: ghcr.io/OWNER/hope:latest
  #   container_name: hope-agent
  #   restart: unless-stopped
  #   command:
  #     - agent
  #     # wss:// rides hope's main HTTPS port through Cloudflare (no extra port).
  #     # Or a bare host:port / tcp://host:port for a raw [agent] listen.
  #     - --connect=wss://hope.example.com/agent/connect
  #     - --token=${HOPE_AGENT_TOKEN}
  #     - --host-id=host-1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     # Cloudflare Access service token (Service Auth policy on the agent path).
  #     # Drop these two if you use an Access Bypass policy instead.
  #     - CF_ACCESS_CLIENT_ID=${CF_ACCESS_CLIENT_ID}
  #     - CF_ACCESS_CLIENT_SECRET=${CF_ACCESS_CLIENT_SECRET}


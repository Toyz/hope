# hope configuration. Copy to config.toml and edit. config.toml is gitignored
# (it holds secrets). Every key can also be set via HOPE_* env vars
# (e.g. HOPE_AUTH_PASSWORD), but this file is the source of truth.

[server]
# Address the API + embedded web UI listen on.
addr = ":8080"

[auth]
# Single login. password may be plaintext (v1 convenience) or a bcrypt hash
# (starts with "$2"); bcrypt is preferred. token_secret signs the stateless
# bearer token — set it to a long random string.
username = "admin"
password = "change-me"
token_secret = "change-me-to-a-long-random-string"
token_ttl = "24h"
# Cloudflare Access SSO (optional). If hope sits behind Cloudflare Access,
# set both and a user who already passed Access is signed straight in — no
# second login. The password login above stays as the LAN/ZeroTier fallback.
# access_team = the <team>.cloudflareaccess.com subdomain (Zero Trust > Settings).
# access_aud  = the Access application's AUD tag (Access > Applications > your app).
# access_team = "yourteam"
# access_aud  = "the-application-aud-tag"
# Headless API access. Set one or more long random keys to call hope's RPC
# without logging in — pass a key as the bearer token:
#   curl -H "Authorization: Bearer <key>" -H "Content-Type: application/json" \
#        -d '{"args":[]}' https://hope.example.com/rpc/Stacks/list
# Enabling this also surfaces the in-app API explorer (/api). Keep keys secret;
# a key is root-equivalent over every host hope manages. Empty = login-only.
# api_keys = ["change-me-to-a-long-random-string"]

[docker]
# Where hope reaches the Docker daemon. Use the mounted unix socket when hope
# runs as a container on the host, or a remote tcp:// endpoint.
host = "unix:///var/run/docker.sock"
# host = "tcp://192.168.69.160:2375"
# Path (inside the container) to a docker config.json for private-registry pull
# credentials. hope reads only INLINE `auth` entries — `docker login` writes
# those by default on Linux. Mount the file where login actually wrote it (e.g.
# /home/<you>/.docker/config.json) to this path. Credential helpers/credsStore
# keep secrets outside the file and can't run in hope's container — prefer the
# [[registry]] blocks below instead.
# config = "/root/.docker/config.json"

# Explicit registry credentials — the reliable way to authenticate pulls without
# a docker config.json mount or a credential helper. Use a Docker Hub account +
# access token (https://app.docker.com/settings) so pulls aren't anonymous and
# rate-limited. Repeat the block per registry (ghcr.io, a private registry, ...).
# [[registry]]
# server = "docker.io"
# username = "your-dockerhub-user"
# password = "dckr_pat_xxxxxxxx"   # a Personal Access Token, not your password

[compose]
# Optional allowlist of on-disk compose project roots. Empty = trust the
# compose labels as-is (operate on any compose-managed stack).
roots = []

[log]
# Request logger: one line per dispatched call. color=ANSI (terminals),
# json=structured lines (for aggregators).
color = true
json = false

[store]
# hope's single persistence setting — an optional embedded state database (bbolt,
# a single pure-Go file, no external service). ONE mounted file holds everything
# hope keeps across a restart: the connected-agent roster (Agents page shows hosts
# as known/last-seen), the image-freshness cache, deploy stack specs (reopen a
# stack in the editor), and — the headline — registry credentials you add from the
# UI (Images page -> "registries"). Empty = nothing is retained (hope still works
# fully; stacks are always read from their Docker labels). Mount a volume and
# point this at it, e.g.:
#   volumes: ["hope-data:/data"]   ->   path = "/data/hope.db"
# SECURITY: secret-bearing — UI-added registry passwords are stored ENCRYPTED with
# auth.token_secret (a leaked hope.db is not plaintext creds) — and hope writes it
# 0600. Keep it on a private volume alongside config.toml.
path = ""

[updates]
# Background crawler that checks each container's image against its registry
# (a manifest lookup — never pulls layers) to power the dashboard "updates"
# section. Mind Docker Hub anonymous rate limits when lowering the interval.
# The freshness cache persists in [store] when mounted, else it's in-memory.
enabled = true
interval = "6h"

[agent]
# Remote-host hub. Setting a token turns on the agent hub: hope-agents on remote
# Docker hosts dial IN and tunnel their socket back, so hope manages them with no
# inbound ports on the remote. The hub endpoint is a WebSocket on hope's MAIN
# port (ws_path below) — it rides 443 through Cloudflare like the UI, so you do
# NOT need to expose a second port. Empty token = hub disabled.
# SECURITY: the token is a shared enrollment secret and the tunnel grants Docker
# (root-equivalent) control of the remote host. Use a long random token, and
# keep the agent path behind Cloudflare Access (service token) or your overlay.
# token   = "change-me-to-a-long-random-string"
# ws_path = "/agent/connect"   # WebSocket endpoint path (default shown)
# Optionally ALSO run a raw TCP hub listener for agents on a trusted LAN/overlay
# (no Cloudflare in between). Empty = WebSocket only.
# listen = ":9443"
# Drive a connected agent's Docker as hope's PRIMARY source instead of the local
# socket — hope waits for this host-id to dial in, then runs entirely against it.
# (Single remote host for now; a multi-host switcher is next.)
# use = "remote-1"
#
# On the remote host, run the agent (same binary):
#   hope agent --connect wss://hope.example.com/agent/connect \
#     --token <token> --host-id remote-1 --docker unix:///var/run/docker.sock \
#     --cf-access-id <id> --cf-access-secret <secret>   # if behind CF Access
# Use a bare host:port (or tcp://host:port) instead of wss:// to hit [listen].

[socketproxy]
# Opt-in LAN-facing reverse proxy that forwards the Docker API to the unix
# socket behind an allowlist. SECURITY: root-equivalent to whoever reaches the
# port — bind to a trusted LAN/overlay only. Defaults are read-only.
enabled = false
listen = ":2375"
allow_methods = ["GET", "HEAD"]
allow_paths = ["/_ping", "/version", "/info", "/v1.*/containers/*", "/v1.*/images/*"]

[cloudflare]
# Opt-in "tunnels" domain: manage public routes per stack via the Cloudflare API,
# so a shared cloudflared connector fronts everything (no dashboard trips, no
# one-container-per-stack). hope does NOT run cloudflared — you run a connector
# (a cloudflared container) with a remotely-managed tunnel's token, labeled
#   ink.hope.tunnel=<tunnel-id>        # marks it a hope-managed connector
#   ink.hope.connector.default=1       # optional: the shared/default connector
#   ink.hope.connector=<friendly name> # optional label shown in the UI
# and hope adds/removes that tunnel's ingress + the matching DNS.
#
# api_token needs TWO policies (minimal):
#   Account   -> Cloudflare Tunnel: Edit   (manage the tunnel + its ingress config)
#   All zones -> DNS: Edit + Zone: Read    (create/delete the CNAME, resolve zones)
# (Optional, live connector health only: Account -> Cloudflare One Connector:
#  cloudflared: Read.)  The token is a secret — keep this file gitignored.
enabled = false
api_token = ""
account_id = ""

[plugins]
# Opt-in plugin system: hope discovers containers on the fleet that expose a small
# JSON-RPC endpoint declared via labels
#   hope.plugin=true             # opt in
#   hope.plugin.port=8080        # the container port the endpoint listens on
#   hope.plugin.path=/__hope     # optional, default /__hope
# and — once you enable each discovered plugin in the UI — renders its data views,
# actions, and live streams inside hope, proxying every call itself. hope never
# exposes a plugin to the browser. This is only the capability gate; which plugins
# are trusted is decided in the UI and persisted in the store ([store] must be
# mounted to keep approvals across restarts). See docs/plugin-protocol.md.
enabled = false
